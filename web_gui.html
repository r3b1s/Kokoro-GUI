<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kokoro TTS Web Interface</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --input-bg: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #6366f1;
            --accent-hover: #4f46e5;
            --accent-secondary: #0ea5e9;
            --accent-secondary-hover: #0284c7;
            --border-color: #334155;
            --focus-ring: rgba(99, 102, 241, 0.5);
            --error-bg: #450a0a;
            --error-text: #fca5a5;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            /* Sophisticated dark atmospheric background */
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a 40%, #020617);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select,
        textarea,
        input[type="range"] {
            width: 100%;
            background-color: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 15px;
            transition: all 0.2s ease;
            outline: none;
        }

        select:focus,
        textarea:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        textarea {
            height: 140px;
            resize: vertical;
            line-height: 1.5;
        }

        /* Custom Scrollbar for Textarea */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: var(--input-bg);
            border-radius: 0 8px 8px 0;
        }
        textarea::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 8px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Custom Range Slider */
        input[type="range"] {
            padding: 0;
            height: 6px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            appearance: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: var(--accent-primary);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        .speed-display {
            font-size: 14px;
            margin-top: 8px;
            display: block;
            color: var(--text-muted);
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        #generateBtn {
            background-color: var(--accent-primary);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
        }

        #generateBtn:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        #downloadBtn {
            background-color: var(--accent-secondary);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(14, 165, 233, 0.39);
            display: none;
        }

        #downloadBtn:hover {
            background-color: var(--accent-secondary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5);
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Audio Player Styling */
        #audioPlayer {
            width: 100%;
            margin-top: 25px;
            border-radius: 8px;
            outline: none;
            background-color: var(--input-bg);
        }
        
        #audioPlayer::-webkit-media-controls-panel {
            background-color: var(--input-bg);
        }
        
        #audioPlayer::-webkit-media-controls-current-time-display,
        #audioPlayer::-webkit-media-controls-time-remaining-display {
            color: var(--text-main);
        }

        .error {
            color: var(--error-text);
            margin-top: 20px;
            text-align: center;
            display: none;
            background: var(--error-bg);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #7f1d1d;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
            Kokoro TTS
        </h2>

        <div class="form-group">
            <label for="voice">Select Voice</label>
            <select id="voice">
                <option value="">Loading voices...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="text">Text to Speak</label>
            <textarea id="text" placeholder="Enter your text here...">Hello! This is a test of the Kokoro text to speech model running locally on my machine.</textarea>
        </div>

        <div class="form-group">
            <label for="speed">Playback Speed</label>
            <input type="range" id="speed" min="0.5" max="3.0" step="0.1" value="1.0">
            <span class="speed-display" id="speedValue">1.0x</span>
        </div>

        <div class="button-group">
            <button type="button" id="generateBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                Generate Speech
            </button>
            <button type="button" id="downloadBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Download Audio
            </button>
        </div>

        <audio id="audioPlayer" controls style="display: none;"></audio>
        <div id="errorMessage" class="error"></div>
    </div>

    <script>
        // This points to your Flask server
        const API_BASE = "http://127.0.0.1:8000";

        const voiceSelect = document.getElementById("voice");
        const textInput = document.getElementById("text");
        const speedInput = document.getElementById("speed");
        const speedValue = document.getElementById("speedValue");
        const generateBtn = document.getElementById("generateBtn");
        const downloadBtn = document.getElementById("downloadBtn");
        const audioPlayer = document.getElementById("audioPlayer");
        const errorMessage = document.getElementById("errorMessage");

        let currentAudioUrl = null;

        // Update the speed text when sliding
        speedInput.addEventListener("input", (e) => {
            speedValue.textContent = parseFloat(e.target.value).toFixed(1) + "x";
        });

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.style.display = "block";
        }

        // 1. Fetch voices from Flask when the page loads
        async function loadVoices() {
            try {
                const response = await fetch(`${API_BASE}/voices`);
                if (!response.ok) throw new Error("Failed to fetch voices");

                const data = await response.json();
                voiceSelect.innerHTML = "";

                data.voices.forEach(voice => {
                    const option = document.createElement("option");
                    option.value = voice;
                    option.textContent = voice;
                    voiceSelect.appendChild(option);
                });
            } catch (error) {
                console.error("Error loading voices:", error);
                voiceSelect.innerHTML = '<option value="af_heart">af_heart (Fallback)</option>';
                showError("Could not connect to the backend server. Is Flask running on port 8000?");
            }
        }

        // 2. Send text to Flask to generate audio
        generateBtn.addEventListener("click", async (event) => {
            event.preventDefault();
            const text = textInput.value.trim();
            if (!text) return alert("Please enter some text!");

            errorMessage.style.display = "none";
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> Generating...';
            audioPlayer.style.display = "none";
            downloadBtn.style.display = "none";

            try {
                const response = await fetch(`${API_BASE}/synthesize`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        text: text,
                        voice: voiceSelect.value,
                        speed: parseFloat(speedInput.value)
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error || `Server error: ${response.status}`);
                }

                const blob = await response.blob();
                
                if (currentAudioUrl) {
                    URL.revokeObjectURL(currentAudioUrl);
                }
                
                currentAudioUrl = URL.createObjectURL(blob);

                audioPlayer.src = currentAudioUrl;
                audioPlayer.style.display = "block";
                audioPlayer.play();
                
                downloadBtn.style.display = "flex";

            } catch (error) {
                console.error("Synthesis error:", error);
                showError(error.message || "Failed to generate speech.");
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg> Generate Speech';
            }
        });

        // 3. Handle the download button click
        downloadBtn.addEventListener("click", () => {
            if (!currentAudioUrl) return;
            
            const a = document.createElement("a");
            a.href = currentAudioUrl;
            a.download = "kokoro_tts_audio.wav"; 
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        // Run on startup
        loadVoices();
    </script>
</body>

</html>
